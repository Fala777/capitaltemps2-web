<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldung - Capital Weather</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="../script.js" defer></script>
    <script src="../login.js" defer></script>
</head>
<body>
    <div class="moving-image-bg"></div>

    <header>
        <div class="header-logo">
            <img src="../resources/images/logo.jpg" alt="Capital Weather Logo" />
        </div>
        <span class="mobile-page-title">Anmeldung</span>
        <nav>
            <a href="../index.html">Startseite</a>
            <a href="capitalWeather.html">Wetter</a>
            <a href="aboutUS.html">About Us</a>
            <a href="login.html" id="nav-login-link">Anmeldung</a>
        </nav>
        <div class="user-menu" id="user-menu" style="display: none;">
            <button class="user-menu-button" id="user-menu-button"></button>
            <div class="user-dropdown" id="user-dropdown">
                <button id="disconnect-button" class="disconnect-button">Abmelden</button>
            </div>
        </div>
        <div class="burger-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <main class="centered-page">
        <section id="login-section" class="centered-form">
            <h1>Anmeldung</h1>
            
            <form>
                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <a href="register.html" class="link-button">Registrieren</a>
                <button type="submit">Anmelden</button>
            </form>

            <p class="mt-3">
                <a href="lostPW.html">Passwort vergessen?</a>
            </p>
        </section>
    </main>

    <footer>
        <p> email: pengu@capitalweather.ch |  tel: +41 123 456789</p>
        <p> Sihlquai 101, 8090 Zürich</p>
        <p>&copy; 2026 Capital Weather. Alle Rechte vorbehalten.</p>
    </footer>
</body>
</html>
