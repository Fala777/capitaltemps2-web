name: Minify and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # This block is what was missing
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Minifiers
        run: npm install -g terser clean-css-cli

      - name: Prepare Distribution
        run: |
          rm -rf dist
          mkdir -p dist
          
          # Priority: Copy index.html first
          if [ -f src/index.html ]; then
            cp src/index.html dist/
          elif [ -f index.html ]; then
            cp index.html dist/
          fi
          
          # Copy other HTML files
          cp src/*.html dist/ 2>/dev/null || cp *.html dist/ 2>/dev/null || true

      - name: Minify JS
        run: |
          shopt -s nullglob
          for f in src/*.js; do
            echo "Minifying $f..."
            terser "$f" --compress --mangle -o "dist/$(basename "$f")"
          done

      - name: Minify CSS
        run: |
          shopt -s nullglob
          for f in src/*.css; do
            echo "Minifying $f..."
            cleancss -o "dist/$(basename "$f")" "$f"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
